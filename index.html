<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f14;
    color: white;
}

/* Top */
.topbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
}

.logo {
    font-size: 20px;
    font-weight: bold;
}

.lang {
    color: #ccc;
}

/* Centro */
.main {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 90vh;
}

.container {
    background: #141a20;
    padding: 40px;
    border-radius: 12px;
    width: 500px;
}

/* Texto */
h2 { margin-bottom: 5px; }
p { color: #aaa; margin-bottom: 20px; }

/* Inputs */
input {
    width: 100%;
    padding: 14px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #555;
    background: transparent;
    color: white;
}

input:focus {
    border: 1px solid #fff;
}

/* Error */
.error {
    color: #ff4d4d;
    font-size: 13px;
    margin-bottom: 10px;
}

/* Checkbox */
.checkbox {
    display: flex;
    align-items: center;
    margin: 15px 0;
}

/* Botón */
.actions {
    display: flex;
    justify-content: flex-end;
}

button {
    padding: 12px 25px;
    background: #d62828;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff3b3b;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="logo">JOYclub</div>
    <div class="lang">🌐 Español</div>
</div>

<div class="main">
    <div class="container">
        <h2>Bienvenido de nuevo</h2>
        <p>Conéctate con tu cuenta</p>

        <input type="text" id="usuario" placeholder="Tu usuario">
        <div id="errorUser" class="error"></div>

        <input type="password" id="password" placeholder="Contraseña">
        <div id="errorPass" class="error"></div>

        <div class="checkbox">
            <input type="checkbox" id="recordar">
            <label style="margin-left:8px;">Seguir con la sesión</label>
        </div>

        <div class="actions">
            <button onclick="login()">Iniciar sesión</button>
        </div>
    </div>
</div>

<script>
// Cargar datos guardados
window.onload = function() {
    let user = localStorage.getItem("usuario");
    let pass = localStorage.getItem("password");

    if(user && pass){
        document.getElementById("usuario").value = user;
        document.getElementById("password").value = pass;
        document.getElementById("recordar").checked = true;
    }
}

function login() {
    let usuario = document.getElementById("usuario").value;
    let password = document.getElementById("password").value;

    let errorUser = document.getElementById("errorUser");
    let errorPass = document.getElementById("errorPass");

    errorUser.textContent = "";
    errorPass.textContent = "";

    if(usuario === "") {
        errorUser.textContent = "Ingresa tu usuario";
        return;
    }

    if(password === "") {
        errorPass.textContent = "Ingresa tu contraseña";
        return;
    }

    // Usuario de prueba
    if(usuario === "diego" && password === "1234") {

        if(document.getElementById("recordar").checked){
            localStorage.setItem("usuario", usuario);
            localStorage.setItem("password", password);
        } else {
            localStorage.clear();
        }

        alert("Login correcto 🚀");

    } else {
        errorPass.textContent = "Usuario o contraseña incorrectos";
    }
}
</script>

</body>
</html>
